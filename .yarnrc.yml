checksumBehavior: ignore

yarnPath: .yarn/releases/yarn-4.3.1.cjs

packageExtensions:
  '@typescript-eslint/utils@*':
    dependencies:
      eslint: '8'

  'eslint-config-next@*':
    dependencies:
      next: '*'

  '@storybook/nextjs@*':
    dependencies:
      'webpack': '*'
      'storybook': '*'
      'next': '*'

  'storybook@*':
    dependencies:
      'react-dom': '*'

  '@storybook/core@*':
    dependencies:
      'react-dom': '*'
      '@storybook/nextjs': '*'

  '@storybook/react-dom-shim@*':
    dependencies:
      'react-dom': '*'
