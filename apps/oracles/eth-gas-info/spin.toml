spin_manifest_version = 2

[application]
authors = [""]
name = "Eth Gas Info"
version = "0.1.0"

[application.trigger.settings]
interval_time_in_seconds = 10
sequencer = "http://127.0.0.1:9856/post_reports_batch"
secret_key = "536d1f9d97166eba5ff0efb8cc8dbeb856fb13d2d126ed1efc761e9955014003"
second_consensus_secret_key = "536d1f9d97166eba5ff0efb8cc8dbeb856fb13d2d126ed1efc761e9955014003"
kafka_endpoint = "http://127.0.0.1:9092"
reporter_id = 0

[[trigger.oracle]]
component = "eth-gas-info"

[[trigger.oracle.data_feeds]]
id = "70000"
decimals = 2
stride = 0
# Gas price in Gwei (integer-ish). We only need 2 decimals typically.
data = '{"metric":"safe"}'

[[trigger.oracle.data_feeds]]
id = "70001"
decimals = 2
stride = 0
data = '{"metric":"propose"}'

[[trigger.oracle.data_feeds]]
id = "70002"
decimals = 2
stride = 0
data = '{"metric":"fast"}'

[[trigger.oracle.data_feeds]]
id = "70003"
decimals = 2
stride = 0
data = '{"metric":"base"}'

[component.eth-gas-info]
source = "../target/wasm32-wasip1/release/eth_gas_info.wasm"
# NOTE: Spin requires host entries without paths. The Etherscan v2 API base is
# https://api.etherscan.io/v2/api but we must only whitelist the host origin.
allowed_outbound_hosts = ["https://api.etherscan.io"]

[component.eth-gas-info.build]
command = "cargo build --target wasm32-wasip1 --release"
